<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submitted | IPL Tickets</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="brand">
        <h1>Submitted successfully</h1>
        <div class="pill" id="whoami">Loading…</div>
      </div>

      <div class="card">
        <div style="font-weight: 800; font-size: 15px; margin-bottom: 8px;">Thanks for registering</div>
        <div class="hint" style="font-size: 13px;">
          We will inform through mail.
        </div>

        <div style="height: 18px;"></div>
        <button class="btn" id="logoutBtn">Logout</button>

        <div id="msg"></div>
      </div>
    </div>

    <script>
      const whoami = document.getElementById("whoami");
      const logoutBtn = document.getElementById("logoutBtn");
      const msg = document.getElementById("msg");

      function setMsg(text, type) {
        msg.className = type || "";
        msg.textContent = text || "";
      }

      async function loadMe() {
        const res = await fetch("/api/me");
        if (!res.ok) {
          window.location.href = "/employee/login.html";
          return;
        }
        const data = await res.json();
        whoami.textContent = `Logged in: ${data.employeeId}`;
      }

      async function logout() {
        await fetch("/api/logout", { method: "POST" }).catch(() => {});
        window.location.href = "/employee/login.html";
      }

      logoutBtn.addEventListener("click", logout);
      loadMe().catch(() => setMsg("Failed to load.", "error"));
    </script>
  </body>
</html>
